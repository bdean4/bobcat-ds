// ─── GEO MATH ─────────────────────────────────────────────────────────────────
function haversine(a,b){
  const R=6371000,r=x=>x*Math.PI/180;
  const dLat=r(b.lat-a.lat),dLng=r(b.lng-a.lng);
  const x=Math.sin(dLat/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function polyArea(pts){
  if(pts.length<3)return 0;
  const ref=pts[0];
  const xy=pts.map(p=>({
    x:haversine({lat:ref.lat,lng:ref.lng},{lat:ref.lat,lng:p.lng})*(p.lng>=ref.lng?1:-1),
    y:haversine({lat:ref.lat,lng:ref.lng},{lat:p.lat,lng:ref.lng})*(p.lat>=ref.lat?1:-1),
  }));
  let a=0;
  for(let i=0;i<xy.length;i++){const j=(i+1)%xy.length;a+=xy[i].x*xy[j].y-xy[j].x*xy[i].y;}
  return Math.abs(a/2);
}
function perimM(pts){
  if(pts.length<2)return 0;
  let d=0;for(let i=0;i<pts.length;i++)d+=haversine(pts[i],pts[(i+1)%pts.length]);
  return d;
}
const toAc=m=>m/4046.86, toSqFt=m=>m*10.7639, toFt=m=>m*3.28084;
const fmt=(n,d=1)=>Number(n).toLocaleString(undefined,{maximumFractionDigits:d,minimumFractionDigits:d});

// ─── PROJECTION ───────────────────────────────────────────────────────────────
const MOCK={lat:44.428,lng:-95.376};
function buildRef(perimPts,features,linePts){
  const pts=[...perimPts];
  features.forEach(f=>{if(f.lat!=null)pts.push({lat:f.lat,lng:f.lng});if(f.pts)pts.push(...f.pts);});
  if(linePts.length)pts.push(...linePts);
  return pts.length?pts:[MOCK,{lat:MOCK.lat+0.001,lng:MOCK.lng+0.001}];
}
function project(ref,p,W,H){
  const pad=56,lats=ref.map(r=>r.lat),lngs=ref.map(r=>r.lng);
  const minLat=Math.min(...lats),maxLat=Math.max(...lats);
  const minLng=Math.min(...lngs),maxLng=Math.max(...lngs);
  const sc=Math.min((W-pad*2)/(maxLng-minLng||0.001),(H-pad*2)/(maxLat-minLat||0.001));
  const ox=(W-(maxLng-minLng)*sc)/2,oy=(H-(maxLat-minLat)*sc)/2;
  return{x:(p.lng-minLng)*sc+ox,y:H-((p.lat-minLat)*sc+oy)};
}
function unproject(ref,px,py,W,H){
  const pad=56,lats=ref.map(r=>r.lat),lngs=ref.map(r=>r.lng);
  const minLat=Math.min(...lats),maxLat=Math.max(...lats);
  const minLng=Math.min(...lngs),maxLng=Math.max(...lngs);
  const sc=Math.min((W-pad*2)/(maxLng-minLng||0.001),(H-pad*2)/(maxLat-minLat||0.001));
  const ox=(W-(maxLng-minLng)*sc)/2,oy=(H-(maxLat-minLat)*sc)/2;
  return{lat:(H-py-oy)/sc+minLat,lng:(px-ox)/sc+minLng};
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// ─── MACHINE RS3 HOOK ─────────────────────────────────────────────────────────
// Tries: (1) RS3 WebSocket at custom IP:port, (2) browser GPS, (3) simulator
function useMachinePosition(enabled, ip, port){
  const[pos,setPos]=useState(null);
  const[source,setSource]=useState("none");
  const wsRef=useRef(null);
  const simRef=useRef(null);
  const watchRef=useRef(null);

  useEffect(()=>{
    if(!enabled){
      wsRef.current?.close(); clearInterval(simRef.current);
      navigator.geolocation?.clearWatch(watchRef.current);
      setPos(null); setSource("none"); return;
    }
    let settled=false;

    function startSim(){
      setSource("sim"); let angle=0;
      simRef.current=setInterval(()=>{
        angle+=0.04;
        setPos({lat:MOCK.lat+Math.sin(angle)*0.00025, lng:MOCK.lng+Math.cos(angle)*0.00025,
          elev:312.1+Math.sin(angle*2)*0.3, fixType:"RTK Fix", fixQ:4, heading:((angle*180/Math.PI)%360+360)%360});
      },800);
    }

    function tryGPS(){
      if(!navigator.geolocation){startSim();return;}
      watchRef.current=navigator.geolocation.watchPosition(
        gp=>{settled=true;setSource("gps");
          setPos({lat:gp.coords.latitude,lng:gp.coords.longitude,
            elev:gp.coords.altitude||0,fixType:"GPS",fixQ:1,
            heading:gp.coords.heading||0});},
        ()=>startSim(),{enableHighAccuracy:true,maximumAge:1000});
    }

    try{
      const ws=new WebSocket(\`ws://\${ip}:\${port}\`);
      ws.onopen=()=>{settled=true;setSource("rs3");};
      ws.onmessage=e=>e.data.split("\\n").forEach(l=>{const p=parseGGA(l.trim());if(p){setPos(p);}});
      ws.onerror=()=>{if(!settled)tryGPS();};
      wsRef.current=ws;
    }catch{tryGPS();}

    return()=>{
      wsRef.current?.close(); clearInterval(simRef.current);
      navigator.geolocation?.clearWatch(watchRef.current);
    };
  },[enabled,ip,port]);

  return{pos,source};
}

// ─── PROXIMITY CHECK ──────────────────────────────────────────────────────────
const PROX_M=3;
function nearestAlert(machinePos, features){
  if(!machinePos||!features.length) return null;
  let nearest=null, minDist=Infinity;
  features.forEach(f=>{
    const pts=f.lat!=null?[{lat:f.lat,lng:f.lng}]:(f.pts||[]);
    pts.forEach(p=>{
      const d=haversine(machinePos,p);
      if(d<minDist){minDist=d; nearest={feature:f,dist:d};}
    });
  });
  return nearest&&nearest.dist<=PROX_M ? nearest : null;
}

// ─── MAP CANVAS ───────────────────────────────────────────────────────────────
function MapCanvas({project:proj,features,onAddPerim,onUndo,onClose,onAddFeature,onUpdateFeature,mapMode,activeUtil,linePts,onAddLinePt,onFinishLine,mapStyle,machinePos,machineEnabled}){
  const cvsRef=useRef(null);
  const pressRef=useRef(null);
  const[hover,setHover]=useState(null);
  const[radial,setRadial]=useState(null);
  const[selectedPin,setSelectedPin]=useState(null);
  const W=800,H=460;
  const{perimPts,closed}=proj;
  const proxAlert=nearestAlert(machinePos,features);

  const getEvPx=e=>{
    const c=cvsRef.current;if(!c)return{px:0,py:0};
    const rect=c.getBoundingClientRect();
    return{px:(e.clientX-rect.left)*(W/rect.width),py:(e.clientY-rect.top)*(H/rect.height)};
  };

  // ── draw ───────────────────────────────────────────────────────────────────
  useEffect(()=>{
    const canvas=cvsRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,W,H);
    const ref=buildRef(perimPts,features,linePts);

    // Background by map style
    if(mapStyle==="satellite"){
      ctx.fillStyle="#2D3A2E";ctx.fillRect(0,0,W,H);
      // field patches
      const patches=[
        {x:0,y:0,w:W*0.55,h:H*0.45,c:"#3A4F2C"},{x:W*0.55,y:0,w:W*0.45,h:H*0.42,c:"#2E3D20"},
        {x:0,y:H*0.45,w:W*0.6,h:H*0.55,c:"#354428"},{x:W*0.6,y:H*0.42,w:W*0.4,h:H*0.58,c:"#293820"},
      ];
      patches.forEach(p=>{ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.w,p.h);});
      ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=1;
      for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      // roads
      ctx.strokeStyle="rgba(120,100,60,0.7)";ctx.lineWidth=7;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(0,H*0.4);ctx.lineTo(W,H*0.4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(W*0.62,0);ctx.lineTo(W*0.62,H);ctx.stroke();
    } else if(mapStyle==="topo"){
      ctx.fillStyle="#EEE8D5";ctx.fillRect(0,0,W,H);
      // contour lines
      ctx.strokeStyle="rgba(180,150,80,0.35)";ctx.lineWidth=1;ctx.setLineDash([]);
      for(let i=0;i<8;i++){
        ctx.beginPath();
        ctx.ellipse(W*0.4,H*0.5,80+i*40,50+i*28,0.3,0,Math.PI*2);
        ctx.stroke();
      }
      ctx.strokeStyle="rgba(160,130,60,0.5)";ctx.lineWidth=1.5;
      ctx.beginPath();ctx.ellipse(W*0.4,H*0.5,80,50,0.3,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle="rgba(180,150,80,0.2)";ctx.fill();
      // roads
      ctx.strokeStyle="rgba(200,160,80,0.8)";ctx.lineWidth=6;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(0,H*0.4);ctx.lineTo(W,H*0.4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(W*0.62,0);ctx.lineTo(W*0.62,H);ctx.stroke();
      ctx.strokeStyle="rgba(160,120,60,0.4)";ctx.lineWidth=1;ctx.setLineDash([6,6]);
      ctx.beginPath();ctx.moveTo(0,H*0.4);ctx.lineTo(W,H*0.4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(W*0.62,0);ctx.lineTo(W*0.62,H);ctx.stroke();
      ctx.setLineDash([]);
    } else {
      // Default
      ctx.fillStyle="#E8ECF0";ctx.fillRect(0,0,W,H);
      ctx.strokeStyle="rgba(255,255,255,0.65)";ctx.lineWidth=1;
      for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      ctx.strokeStyle="rgba(255,255,255,0.9)";ctx.lineWidth=8;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(0,H*0.4);ctx.lineTo(W,H*0.4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(W*0.62,0);ctx.lineTo(W*0.62,H);ctx.stroke();
      ctx.strokeStyle="rgba(200,200,200,0.5)";ctx.lineWidth=1;ctx.setLineDash([8,8]);
      ctx.beginPath();ctx.moveTo(0,H*0.4);ctx.lineTo(W,H*0.4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(W*0.62,0);ctx.lineTo(W*0.62,H);ctx.stroke();
      ctx.setLineDash([]);
    }

    // Empty hint
    if(!perimPts.length&&!features.length&&!linePts.length){
      const labelColor=mapStyle==="satellite"?"rgba(255,255,255,0.7)":"rgba(0,0,0,0.22)";
      ctx.fillStyle=labelColor;ctx.font="600 14px DM Sans,system-ui";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("Hold to place a utility  ·  Tap to draw your site boundary",W/2,H/2-8);
      ctx.font="400 12px DM Sans,system-ui";
      ctx.fillStyle=mapStyle==="satellite"?"rgba(255,255,255,0.45)":"rgba(0,0,0,0.14)";
      ctx.fillText("Perimeters, utility lines & markers — all in one map",W/2,H/2+14);
      return;
    }

    // Polygon fill
    if(perimPts.length>2&&closed){
      const xys=perimPts.map(p=>project(ref,p,W,H));
      ctx.beginPath();ctx.moveTo(xys[0].x,xys[0].y);
      xys.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();
      ctx.fillStyle="rgba(244,121,32,0.13)";ctx.fill();
    }

    // Perimeter outline
    if(perimPts.length>1){
      const xys=perimPts.map(p=>project(ref,p,W,H));
      ctx.beginPath();ctx.moveTo(xys[0].x,xys[0].y);
      xys.forEach(p=>ctx.lineTo(p.x,p.y));
      if(closed)ctx.closePath();
      ctx.strokeStyle=T.orange;ctx.lineWidth=closed?3:2.5;
      ctx.setLineDash(closed?[]:[8,5]);ctx.stroke();ctx.setLineDash([]);

      if(hover&&!closed&&mapMode==="perimeter"){
        const last=xys[xys.length-1],h=project(ref,hover,W,H);
        ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(h.x,h.y);
        ctx.strokeStyle="rgba(244,121,32,0.4)";ctx.lineWidth=2;
        ctx.setLineDash([5,5]);ctx.stroke();ctx.setLineDash([]);
      }

      const segs=closed?perimPts.length:perimPts.length-1;
      for(let i=0;i<segs;i++){
        const a=xys[i],b=xys[(i+1)%xys.length];
        const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
        const d=haversine(perimPts[i],perimPts[(i+1)%perimPts.length]);
        const txt=d<1000?\`\${d.toFixed(1)} m\`:\`\${(d/1000).toFixed(2)} km\`;
        ctx.font="600 11px DM Sans,system-ui";
        const tw=ctx.measureText(txt).width;
        ctx.fillStyle="white";ctx.shadowBlur=8;ctx.shadowColor="rgba(0,0,0,0.12)";
        roundRect(ctx,mx-tw/2-8,my-10,tw+16,20,6);ctx.fill();ctx.shadowBlur=0;
        ctx.fillStyle=T.orange;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(txt,mx,my);
      }

      perimPts.forEach((p,i)=>{
        const{x,y}=project(ref,p,W,H);
        ctx.shadowBlur=12;ctx.shadowColor="rgba(244,121,32,0.35)";
        ctx.beginPath();ctx.arc(x,y,i===0?12:8,0,Math.PI*2);
        ctx.fillStyle=T.orange;ctx.fill();ctx.shadowBlur=0;
        ctx.strokeStyle="white";ctx.lineWidth=2.5;ctx.stroke();
        ctx.fillStyle="white";ctx.font=\`bold \${i===0?11:10}px DM Sans,system-ui\`;
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(i===0?"A":String(i+1),x,y);
      });
    }

    // Active line
    if(mapMode==="line"&&linePts.length>0){
      const u=UTILS.find(u=>u.id===activeUtil)||UTILS[0];
      const xys=linePts.map(p=>project(ref,p,W,H));
      ctx.beginPath();ctx.moveTo(xys[0].x,xys[0].y);
      xys.forEach(p=>ctx.lineTo(p.x,p.y));
      if(hover){const h=project(ref,hover,W,H);ctx.lineTo(h.x,h.y);}
      ctx.strokeStyle=u.dot;ctx.lineWidth=4;ctx.setLineDash([10,6]);
      ctx.shadowBlur=8;ctx.shadowColor=u.dot+"88";
      ctx.stroke();ctx.setLineDash([]);ctx.shadowBlur=0;
      xys.forEach(({x,y})=>{ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle=u.dot;ctx.fill();ctx.strokeStyle="white";ctx.lineWidth=1.5;ctx.stroke();});
    }

    // Saved feature lines
    features.filter(f=>f.pts?.length>1).forEach(f=>{
      const u=UTILS.find(u=>u.id===f.type)||UTILS[0];
      const xys=f.pts.map(p=>project(ref,p,W,H));
      ctx.beginPath();ctx.moveTo(xys[0].x,xys[0].y);
      xys.forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.strokeStyle=u.dot;ctx.lineWidth=4;ctx.setLineDash([12,6]);
      ctx.shadowBlur=6;ctx.shadowColor=u.dot+"77";
      ctx.stroke();ctx.setLineDash([]);ctx.shadowBlur=0;
      [xys[0],xys[xys.length-1]].forEach(({x,y})=>{
        ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fillStyle=u.dot;ctx.fill();ctx.strokeStyle="white";ctx.lineWidth=2;ctx.stroke();
      });
      const mid=xys[Math.floor(xys.length/2)];
      ctx.font="600 10px DM Sans,system-ui";
      const tw=ctx.measureText(u.label).width;
      ctx.fillStyle=u.bg;ctx.shadowBlur=5;ctx.shadowColor="rgba(0,0,0,0.1)";
      roundRect(ctx,mid.x-tw/2-10,mid.y-22,tw+20,18,6);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle=u.color;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(u.label,mid.x,mid.y-13);
    });

    // Feature point pins
    features.filter(f=>f.lat!=null).forEach(f=>{
      const u=UTILS.find(u=>u.id===f.type)||UTILS[0];
      const{x,y}=project(ref,{lat:f.lat,lng:f.lng},W,H);
      ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);
      ctx.fillStyle=u.bg+"BB";ctx.fill();
      ctx.shadowBlur=10;ctx.shadowColor=u.dot+"55";
      ctx.beginPath();ctx.arc(x,y,14,0,Math.PI*2);
      ctx.fillStyle=u.bg;ctx.fill();
      ctx.strokeStyle=u.dot;ctx.lineWidth=2.5;ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font="16px system-ui";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(u.emoji,x,y+1);
      // Photo badge
      if(f.photo){
        ctx.beginPath();ctx.arc(x+10,y-10,7,0,Math.PI*2);
        ctx.fillStyle=T.blue;ctx.fill();ctx.strokeStyle="white";ctx.lineWidth=1.5;ctx.stroke();
        ctx.font="9px system-ui";ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillStyle="white";ctx.fillText("📷",x+10,y-10);
      }
    });

    // ── Machine position dot ─────────────────────────────────────────────────
    if(machinePos){
      const{x,y}=project(ref,{lat:machinePos.lat,lng:machinePos.lng},W,H);
      const alert=nearestAlert(machinePos,features);

      // Proximity ring — red pulse when in alert zone
      if(alert){
        ctx.beginPath();ctx.arc(x,y,28,0,Math.PI*2);
        ctx.fillStyle="rgba(220,38,38,0.18)";ctx.fill();
        ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);
        ctx.strokeStyle="rgba(220,38,38,0.5)";ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
      } else {
        // Normal accuracy ring
        ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);
        ctx.fillStyle="rgba(37,99,235,0.12)";ctx.fill();
      }

      // Heading cone (if available)
      if(machinePos.heading!=null&&machinePos.heading!==0){
        const hdg=(machinePos.heading-90)*Math.PI/180;
        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.arc(x,y,30,hdg-0.4,hdg+0.4);
        ctx.closePath();
        ctx.fillStyle=alert?"rgba(220,38,38,0.25)":"rgba(37,99,235,0.2)";
        ctx.fill();
      }

      // Outer ring
      ctx.shadowBlur=14;ctx.shadowColor=alert?"rgba(220,38,38,0.5)":"rgba(37,99,235,0.4)";
      ctx.beginPath();ctx.arc(x,y,13,0,Math.PI*2);
      ctx.fillStyle=alert?T.red:T.blue;ctx.fill();ctx.shadowBlur=0;
      // White border
      ctx.strokeStyle="white";ctx.lineWidth=3;ctx.stroke();
      // Inner dot
      ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);
      ctx.fillStyle="white";ctx.fill();

      // Machine label tag
      const tag="🚜 Machine";
      ctx.font="600 11px DM Sans,system-ui";
      const tw=ctx.measureText(tag).width;
      ctx.shadowBlur=6;ctx.shadowColor="rgba(0,0,0,0.15)";
      roundRect(ctx,x-tw/2-8,y-34,tw+16,20,5);
      ctx.fillStyle=alert?T.red:T.blue;ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle="white";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(tag,x,y-24);
    }

  },[perimPts,closed,hover,features,mapMode,activeUtil,linePts,mapStyle,machinePos]);

  // Track touch start so we can distinguish tap/hold from scroll
  const touchStartRef=useRef(null);

  const handleDown=e=>{
    const{px,py}=getEvPx(e);
    touchStartRef.current={px,py,sx:e.clientX,sy:e.clientY};
    pressRef.current=setTimeout(()=>{
      pressRef.current=null;
      setRadial({sx:e.clientX,sy:e.clientY,px,py});
    },430);
  };

  const handleUp=e=>{
    if(pressRef.current){clearTimeout(pressRef.current);pressRef.current=null;}
    else return;
    if(radial)return;
    const{px,py}=getEvPx(e);
    // If finger moved more than 8px it was a scroll attempt — ignore
    if(touchStartRef.current){
      const dx=Math.abs(e.clientX-touchStartRef.current.sx);
      const dy=Math.abs(e.clientY-touchStartRef.current.sy);
      if(dx>8||dy>8)return;
    }
    const ref=buildRef(perimPts,features,linePts);

    // Check tap on existing pin
    const tappedPin=features.find(f=>{
      if(f.lat==null)return false;
      const{x,y}=project(ref,{lat:f.lat,lng:f.lng},W,H);
      return Math.hypot(px-x,py-y)<20;
    });
    if(tappedPin){setSelectedPin(tappedPin);return;}

    const pt=unproject(ref,px,py,W,H);
    if(mapMode==="perimeter"){
      if(closed)return;
      if(perimPts.length>2){const fp=project(ref,perimPts[0],W,H);if(Math.hypot(px-fp.x,py-fp.y)<24){onClose();return;}}
      onAddPerim(pt);
    } else if(mapMode==="line"){
      onAddLinePt(pt);
    }
  };

  const handleMove=e=>{
    // If this is a touch and has moved significantly, cancel the long-press and let page scroll
    if(touchStartRef.current&&e.pointerType==="touch"){
      const dy=Math.abs(e.clientY-touchStartRef.current.sy);
      if(dy>10){
        if(pressRef.current){clearTimeout(pressRef.current);pressRef.current=null;}
        setHover(null);
        return; // don't call preventDefault — let the scroll happen
      }
    }
    if(pressRef.current){clearTimeout(pressRef.current);pressRef.current=null;}
    const{px,py}=getEvPx(e);
    const ref=buildRef(perimPts,features,linePts);
    setHover(unproject(ref,px,py,W,H));
  };

  const handleLeave=()=>{
    if(pressRef.current){clearTimeout(pressRef.current);pressRef.current=null;}
    touchStartRef.current=null;
    setHover(null);
  };

  const pickUtil=u=>{
    const ref=buildRef(perimPts,features,linePts);
    const pt=unproject(ref,radial.px,radial.py,W,H);
    const newFeature={type:u.id,lat:pt.lat,lng:pt.lng,label:u.label,id:Date.now()};
    onAddFeature(newFeature);
    setSelectedPin(newFeature);
    setRadial(null);
  };

  return(
    <div style={{position:"relative",width:"100%",height:"100%",borderRadius:T.radius,overflow:"hidden"}}>
      <canvas ref={cvsRef} width={W} height={H}
        onPointerDown={handleDown} onPointerUp={handleUp}
        onPointerMove={handleMove} onPointerLeave={handleLeave}
        style={{width:"100%",height:"100%",cursor:"crosshair",display:"block",touchAction:"pan-y"}}/>

      {/* GPS badge */}
      <div style={{position:"absolute",top:12,right:12,background:"white",borderRadius:20,padding:"6px 13px",display:"flex",alignItems:"center",gap:7,boxShadow:T.shadow}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:T.green,display:"inline-block",animation:"gpsPulse 2s infinite"}}/>
        <span style={{fontSize:12,fontWeight:600,color:T.green}}>GPS Active</span>
      </div>

      {/* Machine status pill */}
      {machineEnabled&&(
        <div style={{position:"absolute",top:12,left:12,background:machinePos?"rgba(37,99,235,0.92)":"rgba(0,0,0,0.55)",borderRadius:20,padding:"6px 12px",display:"flex",alignItems:"center",gap:6,boxShadow:T.shadow}}>
          <span style={{fontSize:13}}>🚜</span>
          <span style={{fontSize:11,fontWeight:700,color:"white"}}>
            {machinePos?\`Machine · \${machinePos.fixType}\`:"Locating machine…"}
          </span>
          {machinePos&&<span style={{width:6,height:6,borderRadius:"50%",background:"white",animation:"gpsPulse 1.5s infinite"}}/>}
        </div>
      )}

      {/* ── PROXIMITY ALERT BANNER ── */}
      {proxAlert&&(
        <div style={{position:"absolute",top:machineEnabled?52:12,left:12,right:12,
          background:T.red,borderRadius:12,padding:"11px 16px",
          boxShadow:"0 4px 20px rgba(220,38,38,0.45)",
          display:"flex",alignItems:"center",gap:12,animation:"alertSlide 0.25s ease-out"}}>
          {/* Icon */}
          <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.2)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
            {(UTILS.find(u=>u.id===proxAlert.feature.type)||UTILS[0]).emoji}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:800,fontSize:13,color:"white",lineHeight:1}}>
              ⚠️ {proxAlert.feature.label} Nearby
            </div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.85)",marginTop:3}}>
              {proxAlert.dist.toFixed(1)} m away · Proceed with caution
            </div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:22,fontWeight:900,color:"white",lineHeight:1}}>
              {proxAlert.dist.toFixed(1)}
            </div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.75)",fontWeight:600}}>METRES</div>
          </div>
        </div>
      )}

      {/* Action buttons */}
      <div style={{position:"absolute",bottom:12,right:12,display:"flex",gap:8}}>
        {perimPts.length>0&&!closed&&mapMode==="perimeter"&&(
          <button onPointerDown={e=>{e.stopPropagation();onUndo();}}
            style={{background:"white",border:"none",borderRadius:22,padding:"9px 18px",fontWeight:700,fontSize:13,color:T.text,boxShadow:T.shadowMd,cursor:"pointer",fontFamily:"inherit"}}>
            ↩ Undo
          </button>
        )}
        {perimPts.length>2&&!closed&&mapMode==="perimeter"&&(
          <button onPointerDown={e=>{e.stopPropagation();onClose();}}
            style={{background:T.orange,border:"none",borderRadius:22,padding:"9px 20px",fontWeight:700,fontSize:13,color:"white",boxShadow:\`0 4px 16px rgba(244,121,32,0.35)\`,cursor:"pointer",fontFamily:"inherit"}}>
            Close Shape ✓
          </button>
        )}
        {mapMode==="line"&&linePts.length>1&&(
          <button onPointerDown={e=>{e.stopPropagation();onFinishLine();}}
            style={{background:T.green,border:"none",borderRadius:22,padding:"9px 20px",fontWeight:700,fontSize:13,color:"white",boxShadow:"0 4px 16px rgba(22,163,74,0.3)",cursor:"pointer",fontFamily:"inherit"}}>
            Save Line ✓
          </button>
        )}
      </div>

      <div style={{position:"absolute",bottom:12,left:12,background:"rgba(255,255,255,0.92)",borderRadius:20,padding:"6px 14px",boxShadow:T.shadow}}>
        <span style={{fontSize:11,fontWeight:600,color:T.textSub}}>Hold = Place utility &nbsp;·&nbsp; Tap = Draw &nbsp;·&nbsp; Tap pin = Edit</span>
      </div>

      {radial&&<RadialPicker sx={radial.sx} sy={radial.sy} onPick={pickUtil} onClose={()=>setRadial(null)}/>}
      {selectedPin&&(
        <PhotoPinModal
          feature={selectedPin}
          onSave={updated=>{onUpdateFeature(updated);setSelectedPin(null);}}
          onClose={()=>setSelectedPin(null)}
        />
      )}
    </div>
  );
}

// ─── PROJECTS SCREEN ──────────────────────────────────────────────────────────
function ProjectsScreen({projects,activeId,onSelect,onCreate,onDelete}){
  const[newName,setNewName]=useState("");
  const[showNew,setShowNew]=useState(false);

  const create=()=>{
    if(!newName.trim())return;
    onCreate(newName.trim());
    setNewName("");setShowNew(false);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontWeight:800,fontSize:18,color:T.text}}>Job Site Projects</div>
        <button onClick={()=>setShowNew(s=>!s)}
          style={{background:T.orange,border:"none",borderRadius:22,padding:"8px 18px",color:"white",fontWeight:700,fontSize:13,cursor:"pointer",boxShadow:\`0 4px 12px rgba(244,121,32,0.3)\`,fontFamily:"inherit"}}>
          + New Site
        </button>
      </div>

      {showNew&&(
        <div style={{background:T.surface,borderRadius:T.radius,padding:16,boxShadow:T.shadow}}>
          <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:10}}>New Job Site</div>
          <div style={{display:"flex",gap:8}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&create()}
              placeholder="e.g.  Main St Utility Run, Lot 14 Grading…"
              style={{flex:1,border:\`1.5px solid \${T.border}\`,borderRadius:T.radiusSm,padding:"11px 14px",fontSize:13,color:T.text,outline:"none",fontFamily:"inherit",background:T.bg}}
              autoFocus/>
            <button onClick={create}
              style={{background:T.orange,border:"none",borderRadius:T.radiusSm,color:"white",padding:"0 20px",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
              Create
            </button>
          </div>
        </div>
      )}

      {!projects.length&&(

// ─── NMEA PARSER ──────────────────────────────────────────────────────────────
// Parses GGA sentences: $GPGGA or $GNGGA
// $GNGGA,123519,4807.038,N,01131.000,E,1,08,0.9,545.4,M,46.9,M,,*47
function parseGGA(line){
  if(!line.startsWith("$GNGGA")&&!line.startsWith("$GPGGA"))return null;
  const p=line.split(",");
  if(p.length<15)return null;
  const fixQ=parseInt(p[6]);
  if(!fixQ||fixQ===0)return null;
  const latRaw=parseFloat(p[2]),latDir=p[3];
  const lngRaw=parseFloat(p[4]),lngDir=p[5];
  if(isNaN(latRaw)||isNaN(lngRaw))return null;
  const lat=(Math.floor(latRaw/100)+(latRaw%100)/60)*(latDir==="S"?-1:1);
  const lng=(Math.floor(lngRaw/100)+(lngRaw%100)/60)*(lngDir==="W"?-1:1);
  const sats=parseInt(p[7])||0;
  const hdop=parseFloat(p[8])||99;
  const alt=parseFloat(p[9])||0;   // orthometric height (HAE + geoid sep below)
  const geoid=parseFloat(p[11])||0;
  const elev=alt+geoid; // approx ellipsoidal height
  // Fix quality: 1=GPS, 2=DGPS, 4=RTK fix, 5=RTK float
  const fixType=fixQ===4?"RTK Fix":fixQ===5?"RTK Float":fixQ===2?"DGPS":"GPS";
  return{lat,lng,elev,sats,hdop,fixType,fixQ};
}

// ─── GRADE SCREEN ─────────────────────────────────────────────────────────────
// Real Emlid RS3 connection flow:
//   Step 1 — Join the RS3 WiFi hotspot (SSID: reach:xx:xx, PW: emlidreach)
//   Step 2 — App opens WebSocket to ws://192.168.42.1:9001 (RS3 NMEA TCP output)
//   Step 3 — Stream NMEA GGA sentences, parse live lat/lng/elev/fix status
//   Step 4 — User can also configure NTRIP caster credentials for corrections
// In demo mode (no real RS3 on network) we simulate the NMEA stream.
function GradeScreen(){
  // Connection state machine: idle → wifi_guide → connecting → connected
  const[stage,setStage]=useState("idle");
  const[fixData,setFixData]=useState(null);      // parsed NMEA
  const[ntripOpen,setNtripOpen]=useState(false);
  const[ntrip,setNtrip]=useState({host:"",port:"2101",mount:"",user:"",pass:""});
  const[ntripSaved,setNtripSaved]=useState(false);
  const[benches,setBenches]=useState([]);
  const[nb,setNb]=useState({name:"",elev:""});
  const[rawNmea,setRawNmea]=useState("");
  const[showNmea,setShowNmea]=useState(false);
  const wsRef=useRef(null);
  const simRef=useRef(null);

  // Simulate NMEA stream (used when no real RS3 available)
  const startSimulator=()=>{
    let tick=0;
    simRef.current=setInterval(()=>{
      tick++;
      // Slowly converge to RTK fix
      const fixQ=tick<3?1:tick<6?2:tick<10?5:4;
      const lat=44.4280+(Math.random()-0.5)*0.00002;
      const lng=-95.3755+(Math.random()-0.5)*0.00002;
      const elev=312.441+(Math.random()-0.5)*0.003;
      const sats=tick<3?8:tick<6?12:16+(tick%3);
      const hdop=tick<6?1.2:0.7+(Math.random()*0.2);
      const fixType=fixQ===4?"RTK Fix":fixQ===5?"RTK Float":fixQ===2?"DGPS":"GPS";
      const latDeg=Math.floor(lat);const latMin=(lat-latDeg)*60;
      const lngDeg=Math.abs(Math.floor(lng));const lngMin=(Math.abs(lng)-lngDeg)*60;
      const nmea=\`$GNGGA,\${new Date().toISOString().slice(11,19).replace(/:/g,"")}.00,\`+
        \`\${(latDeg*100+latMin).toFixed(5)},N,\`+
        \`\${(lngDeg*100+lngMin).toFixed(5)},W,\`+
        \`\${fixQ},\${sats},\${hdop.toFixed(1)},\`+
        \`\${(elev-30).toFixed(3)},M,30.000,M,,*6A\`;
      setRawNmea(nmea);
      const parsed=parseGGA(nmea);
      if(parsed)setFixData(parsed);
    },1000);
  };

  const connect=()=>{
    setStage("connecting");
    // Try real WebSocket to Emlid RS3 hotspot IP
    try{
      const ws=new WebSocket("ws://192.168.42.1:9001");
      ws.onopen=()=>{setStage("connected");};
      ws.onmessage=e=>{
        const lines=e.data.split("\\n");
        lines.forEach(l=>{const p=parseGGA(l.trim());if(p){setFixData(p);setRawNmea(l.trim());}});
      };
      ws.onerror=()=>{
        // Real RS3 not reachable — fall back to simulator
        ws.close();
        setStage("connected");
        startSimulator();
      };
      ws.onclose=()=>{if(stage==="connected")setStage("idle");};
      wsRef.current=ws;
    }catch{
      // WebSocket not available in sandbox — go straight to simulator
      setStage("connected");
      startSimulator();
    }
  };

  const disconnect=()=>{
    if(wsRef.current)wsRef.current.close();
    if(simRef.current)clearInterval(simRef.current);
    wsRef.current=null;simRef.current=null;
    setStage("idle");setFixData(null);setRawNmea("");
  };

  useEffect(()=>()=>{
    if(wsRef.current)wsRef.current.close();
    if(simRef.current)clearInterval(simRef.current);
  },[]);

  const addBench=()=>{if(!nb.name||!nb.elev)return;setBenches(b=>[...b,{...nb,id:Date.now()}]);setNb({name:"",elev:""});};
  const snapBench=()=>{
    if(!fixData)return;
    setBenches(b=>[...b,{name:\`BM-\${b.length+1}\`,elev:fixData.elev.toFixed(4),id:Date.now()}]);
  };

  const fixColor=fixData?(fixData.fixQ===4?T.green:fixData.fixQ===5?"#F59E0B":T.red):T.textMuted;
  const fixBg=fixData?(fixData.fixQ===4?T.greenBg:fixData.fixQ===5?"#FEF3C7":T.redBg):T.surfaceAlt;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      {/* ── Step 1: WiFi guide ── */}
      {stage==="idle"&&(
        <div style={{background:T.surface,borderRadius:T.radius,padding:20,boxShadow:T.shadow}}>
          <div style={{fontWeight:800,fontSize:17,color:T.text,marginBottom:4}}>Connect Emlid RS3</div>
          <div style={{fontSize:13,color:T.textSub,marginBottom:20}}>Follow these steps before tapping Connect</div>

          {[
            {n:1,title:"Power on your Emlid RS3",body:'Hold the power button until the LED flashes. The unit will broadcast a WiFi hotspot.'},
            {n:2,title:"Join the RS3 hotspot",body:'Open your device WiFi settings and connect to the network named  reach:xx:xx  (last 4 chars are unique to your unit). Password: emlidreach'},
            {n:3,title:"Return here and connect",body:"Once connected to the RS3 hotspot, tap Connect below. The app opens a direct TCP socket to the unit at 192.168.42.1:9001 and reads the live NMEA stream."},
          ].map(s=>(
            <div key={s.n} style={{display:"flex",gap:12,marginBottom:16}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:T.orange,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,flexShrink:0}}>{s.n}</div>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:3}}>{s.title}</div>
                <div style={{fontSize:13,color:T.textSub,lineHeight:1.6}}>{s.body}</div>
              </div>
            </div>
          ))}

          <div style={{background:T.blueBg,borderRadius:T.radiusSm,padding:"11px 14px",marginBottom:16,fontSize:12,color:T.blue,lineHeight:1.6}}>
            💡 <strong>Tip:</strong> The RS3 also supports NTRIP corrections over cellular. Configure your caster details below after connecting for sub-centimeter RTK Fix accuracy in the field.
          </div>

          <button onClick={()=>setStage("wifi_guide")}
            style={{width:"100%",background:T.orange,border:"none",borderRadius:T.radiusSm,color:"white",padding:14,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:\`0 4px 16px rgba(244,121,32,0.3)\`,fontFamily:"inherit"}}>
            I'm connected to the RS3 hotspot — Connect
          </button>
        </div>
      )}

      {/* ── Step 2: Connecting ── */}
      {stage==="wifi_guide"&&(
        <div style={{background:T.surface,borderRadius:T.radius,padding:24,boxShadow:T.shadow,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>📡</div>
          <div style={{fontWeight:800,fontSize:16,color:T.text,marginBottom:8}}>Opening NMEA Stream</div>
          <div style={{fontSize:13,color:T.textSub,marginBottom:24,lineHeight:1.6}}>
            Connecting to <strong>ws://192.168.42.1:9001</strong><br/>
            This is the RS3's built-in NMEA TCP output port
          </div>
          <button onClick={connect}
            style={{width:"100%",background:T.orange,border:"none",borderRadius:T.radiusSm,color:"white",padding:14,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            {stage==="connecting"?"Opening connection…":"Connect Now"}
          </button>
          <button onClick={()=>setStage("idle")} style={{background:"none",border:"none",color:T.textSub,marginTop:12,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>← Back</button>
        </div>
      )}

      {/* ── Connected ── */}
      {stage==="connected"&&(
        <>
          {/* Status bar */}
          <div style={{background:T.surface,borderRadius:T.radius,padding:18,boxShadow:T.shadow}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontWeight:800,fontSize:16,color:T.text}}>Emlid RS3</div>
                <div style={{fontSize:12,color:T.textSub,marginTop:1}}>192.168.42.1 : 9001 · NMEA stream</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {fixData&&(
                  <div style={{background:fixBg,borderRadius:20,padding:"5px 12px",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{width:7,height:7,borderRadius:"50%",background:fixColor,animation:fixData.fixQ>=4?"gpsPulse 1.5s infinite":"none"}}/>
                    <span style={{fontSize:12,fontWeight:700,color:fixColor}}>{fixData.fixType}</span>
                  </div>
                )}
                <button onClick={disconnect} style={{background:T.redBg,border:"none",borderRadius:20,padding:"5px 12px",color:T.red,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Disconnect</button>
              </div>

            {/* Satellite / signal stats */}

              const cut=delta!=null&&delta>0;
              return(
                <div key={bm.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",background:T.bg,borderRadius:T.radiusSm,marginBottom:8,border:\`1.5px solid \${delta!=null?(cut?"rgba(220,38,38,0.15)":"rgba(22,163,74,0.15)"):T.border}\`}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:T.text}}>{bm.name}</div>
                    <div style={{fontSize:12,color:T.textSub,marginTop:2}}>Design: {parseFloat(bm.elev).toFixed(4)} m</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    {delta!=null?(
                      <>
                        <div style={{fontSize:24,fontWeight:900,color:cut?T.red:T.green}}>{cut?"+":""}{delta.toFixed(4)} m</div>
                        <div style={{fontSize:11,fontWeight:700,color:cut?T.red:T.green,marginTop:2}}>{cut?"▲ Fill Required":"▼ Cut Required"}</div>
                      </>
                    ):<div style={{fontSize:13,color:T.textMuted}}>Waiting…</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}
